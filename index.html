<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄门四季万年历 · 承天受命版</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        :root {
            --bg-color: #f2f7f2;
            --main-color: #2d5a27;
            --accent-color: #8fb08a;
            --ink: #1a1a1a;
            --gold: #b28f5b;
        }

        .season-spring { --bg-color: #f2f7f2; --main-color: #2d5a27; --accent-color: #8fb08a; }
        .season-summer { --bg-color: #fdf2f2; --main-color: #a52a2a; --accent-color: #e6a2a2; }
        .season-autumn { --bg-color: #fcfaf2; --main-color: #b28f5b; --accent-color: #d4bc9c; }
        .season-winter { --bg-color: #f2f4f7; --main-color: #2c3e50; --accent-color: #95a5a6; }

        body {
            background-color: var(--bg-color);
            background-image: url('https://www.transparenttextures.com/patterns/rice-paper-3.png');
            transition: background-color 2s ease;
            color: var(--ink);
            font-family: "STKaiti", "KaiTi", "楷体", serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .tai-chi-fixed {
            position: fixed;
            font-size: 80vh;
            color: rgba(0, 0, 0, 0.02);
            z-index: -1;
            animation: rotate 120s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container {
            width: 420px;
            padding: 50px;
            border: 1px solid var(--accent-color);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
        }

        .talisman-border {
            position: absolute;
            width: 30px;
            height: 90%;
            top: 5%;
            border: 1px solid var(--main-color);
            opacity: 0.4;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            font-size: 12px;
            color: var(--main-color);
        }
        .left-t { left: 10px; border-radius: 50px 0 0 50px; }
        .right-t { right: 10px; border-radius: 0 50px 50px 0; }

        header h1 {
            font-size: 28px;
            letter-spacing: 10px;
            color: var(--main-color);
            margin: 0;
            text-align: center;
        }

        .lunar-info { margin: 30px 0; text-align: center; }
        #lunar-day { font-size: 3.2em; display: block; color: var(--ink); }
        #gz-info { font-size: 1.1em; color: var(--main-color); margin-top: 10px; }

        .yiji-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            border-top: 2px double var(--accent-color);
            padding-top: 20px;
        }

        .yiji-item { padding: 10px; text-align: center; }
        .yiji-item b { font-size: 1.8em; display: block; margin-bottom: 10px; }
        .yi b { color: #3e7d37; }
        .ji b { color: #a52a2a; }

        .items-text { font-size: 1.05em; line-height: 1.8; min-height: 120px; }

        /* 道语展示区 */
        .motto {
            margin-top: 40px;
            padding: 20px;
            min-height: 80px;
            border: 1px dashed var(--accent-color);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: rgba(255,255,255,0.3);
        }
        .motto-content { font-size: 1.1em; color: #333; line-height: 1.6; }
        .motto-from { font-size: 0.85em; color: var(--main-color); margin-top: 10px; opacity: 0.8; }

        /* 加载动画 */
        .loading-text { letter-spacing: 2px; color: var(--gold); font-size: 0.9em; }
    </style>
</head>
<body id="bodyTag">

<div class="tai-chi-fixed">☯</div>

<div class="container">
    <div class="talisman-border left-t"><span>敕</span><span>令</span><span>天</span><span>地</span><span>玄</span><span>黄</span></div>
    <div class="talisman-border right-t"><span>内</span><span>有</span><span>霹</span><span>雳</span><span>雷</span><span>神</span><span>隐</span></div>

    <header>
        <h1 id="seasonName">万年历</h1>
    </header>

    <div class="lunar-info">
        <span id="solar-txt" style="color: #888;"></span>
        <strong id="lunar-day"></strong>
        <div id="gz-info"></div>
    </div>

    <div class="yiji-wrap">
        <div class="yiji-item yi">
            <b>宜</b>
            <div class="items-text" id="yi-list"></div>
        </div>
        <div class="yiji-item ji">
            <b>忌</b>
            <div class="items-text" id="ji-list"></div>
        </div>
    </div>

    <div class="motto" id="motto-box">
        <div id="motto-display" class="loading-text">正在观象感应...</div>
    </div>
</div>

<script>
    // 专门设计的网络语录获取函数
    async function fetchOnlineTao() {
        const display = document.getElementById('motto-display');
        
        // 核心经典 fallback 库 (如果网络不通或 API 挂了，依然保证格调)
        const daoLibrary = [
            { text: "大直若屈，大巧若拙，大辩若讷。", from: "《道德经》" },
            { text: "天地有大美而不言，四时有明法而不议。", from: "《庄子》" },
            { text: "所谓无为者，不先物为也；所谓无不为者，因物之所为也。", from: "《淮南子》" },
            { text: "清静者，德之本也；纷杂者，智之末也。", from: "《文子》" }
        ];

        try {
            // 这里使用古诗词开放接口 jinrishici.com (非常稳定)
            // 它能根据时令、地理位置返回极具意境的句子
            const response = await fetch('https://v1.jinrishici.com/all.json');
            if (!response.ok) throw new Error();
            
            const data = await response.json();
            
            // 渲染获取到的内容
            display.innerHTML = `
                <div class="motto-content">${data.content}</div>
                <div class="motto-from">—— ${data.author} · 《${data.origin}》</div>
            `;
        } catch (e) {
            // 降级方案：从本地经典库中随机抽取
            const item = daoLibrary[Math.floor(Math.random() * daoLibrary.length)];
            display.innerHTML = `
                <div class="motto-content">${item.text}</div>
                <div class="motto-from">—— ${item.from}</div>
            `;
        }
    }

    function initDaoCalendar() {
        const now = new Date();
        const month = now.getMonth() + 1;
        const body = document.getElementById('bodyTag');
        const seasonTitle = document.getElementById('seasonName');

        // 1. 动态季节切换
        if (month >= 3 && month <= 5) { body.className = 'season-spring'; seasonTitle.innerText = "青阳 · 仲春"; }
        else if (month >= 6 && month <= 8) { body.className = 'season-summer'; seasonTitle.innerText = "朱明 · 盛夏"; }
        else if (month >= 9 && month <= 11) { body.className = 'season-autumn'; seasonTitle.innerText = "白藏 · 金秋"; }
        else { body.className = 'season-winter'; seasonTitle.innerText = "玄英 · 隆冬"; }

        // 2. 农历计算
        const d = Lunar.fromDate(now);
        document.getElementById('solar-txt').innerText = now.toLocaleDateString('zh-CN', {year:'numeric', month:'long', day:'numeric'});
        document.getElementById('lunar-day').innerText = d.getMonthInChinese() + '月' + d.getDayInChinese();
        document.getElementById('gz-info').innerText = `${d.getYearInGanZhi()}(${d.getYearShengXiao()})年 ${d.getMonthInGanZhi()}月 ${d.getDayInGanZhi()}日`;

        // 3. 宜忌显示
        document.getElementById('yi-list').innerHTML = d.getDayYi().slice(0, 5).join('<br>');
        document.getElementById('ji-list').innerHTML = d.getDayJi().slice(0, 5).join('<br>');

        // 4. 执行网络获取
        fetchOnlineTao();
    }

    initDaoCalendar();
</script>
</body>
</html>
